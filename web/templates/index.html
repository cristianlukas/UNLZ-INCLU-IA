<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Inclu-IA - Subtitulos en vivo</title>
    <link rel="icon" href="/static/icon-128.png" />
    <link rel="apple-touch-icon" sizes="128x128" href="/static/icon-128.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/static/icon-512.png" />
    
    <!-- Soporte PWA -->
    <link rel="manifest" href="/static/manifest.json">
    <meta name="test-manifest" content="FUNCIONA">
    <link rel="icon" href="/static/favicon.ico">  
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="theme-color" content="#0f0a09" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
  
    <link rel="stylesheet" href="/static/styles.css" />
    <script src="/static/vendor/socket.io.min.js" defer></script>
  </head>
  <body>
    <main class="app" data-theme="light" data-font="m">
      <header class="panel">
        <div class="header-content">
          <div class="title-badge">
            <h1>Inclu-IA</h1>
            <div class="badge-menu-row">
              <div class="header-menu">
                <button id="menuToggle" type="button">⚙️</button>
                <div class="menu-content">
                  <div>
                    <label for="fontSize">Tamaño de letra:</label>
                    <select id="fontSize">
                      <option value="s">S</option>
                      <option value="m" selected>M</option>
                      <option value="l">L</option>
                    </select>
                  </div>
                  <div>
                    <label for="contrastMode">Contraste:</label>
                    <select id="contrastMode">
                      <option value="normal" selected>Light</option>
                      <option value="high">Alto</option>
                      <option value="oled">OLED</option>
                  </select>
                  </div>
                </div>


              </div>
            </div>
          </div>
          <p id="networkHint" class="muted">Conectando...</p>
        </div>
      </header>

      <section class="panel live" aria-live="polite" aria-atomic="true">
        <div class="live-header">
          <h2>Subtitulo en vivo</h2>
          <span id="statusPill" class="pill">Inicializando</span>
        </div>
        <p id="liveCaption" class="caption-live">Esperando audio...</p>
      </section>

      <section class="panel history" aria-live="polite" aria-label="Historial de subtitulos">
        <div class="history-title">
          <h2 class="title-left">Historial</h2>
          <span id="sourceTag" class="tag">source: -</span>
          <button id="clearBtn" type="button">Limpiar</button>
      </div>
        <ul id="historyList" class="history-list"></ul>
      </section>
    </main>

    <script src="/static/app.js" defer></script>
  </body>
</html>
